name: Deal Scanner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deal scanner
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_TOKEN:    ${{ secrets.PUSHOVER_TOKEN }}
        run: python scanner.py

      - name: Commit updated deal log
        run: |
          git config user.name  "Deal Scanner Bot"
          git config user.email "bot@deal-scanner"
          git add data/
          git diff --staged --quiet || (git pull --rebase && git commit -m "Update deals $(date -u '+%Y-%m-%d %H:%M')" && git push)
